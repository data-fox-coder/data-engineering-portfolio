name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          RAWG_API_KEY: ci_dummy_key
          DB_PATH: "data/rawg_ci.duckdb"
        run: |
          pytest tests/ -v --tb=short

  dbt:
    name: dbt build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python ingestion (bronze + silver)
        env:
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
          DB_PATH: "data/rawg.duckdb"
        run: |
          python -m rawg_pipeline.bronze.ingest
          python -m rawg_pipeline.silver.transform

      - name: dbt build (compile + run + test)
        working-directory: dbt_rawg
        env:
          DB_PATH: "../data/rawg.duckdb"
        run: |
          dbt deps
          dbt build --profiles-dir .

  lint:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check rawg_pipeline/ tests/
