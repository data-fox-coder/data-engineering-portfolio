rawg_dbt:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Reference root-level database file. Environment variable override enabled for CI/CD flexibility.
      path: "{{ env_var('DBT_DUCKDB_PATH', 'rawg_data.duckdb') }}"
      schema: main
      threads: 1
    prod:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'rawg_data.duckdb') }}"
      schema: main
      threads: 4