version: 2

sources:
  - name: bronze
    description: "Raw ingested data from the RAWG API — written by the Python ingestion layer."
    schema: bronze
    tables:
      - name: bronze_games
        description: "Append-only raw game JSON payloads from GET /games."
        columns:
          - name: id
            description: "Surrogate primary key."
          - name: rawg_id
            description: "RAWG game ID extracted from the raw payload."
          - name: raw_json
            description: "Full API response as a JSON string."
          - name: ingested_at
            description: "Timestamp when the row was written."

      - name: bronze_genres
        description: "Raw genre payloads from GET /genres."
        columns:
          - name: rawg_id
            description: "RAWG genre ID."
          - name: raw_json
            description: "Full API response as a JSON string."

      - name: bronze_platforms
        description: "Raw platform payloads from GET /platforms."
        columns:
          - name: rawg_id
            description: "RAWG platform ID."
          - name: raw_json
            description: "Full API response as a JSON string."
